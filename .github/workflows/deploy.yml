name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Or "master" if that is your main branch name

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject API Key
        # This step finds the placeholder in your JS and replaces it with the secret
        run: |
          sed -i "s/INJECT_API_KEY_HERE/${{ secrets.NVIDIA_API_KEY }}/g" script.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4