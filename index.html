<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ragnar AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Dark overlay for mobile menu -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Collapsible Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <button id="sidebar-toggle" class="icon-btn" title="Toggle Menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <button id="new-chat-btn" class="icon-btn new-chat-btn" title="New Chat">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    <span class="sidebar-text">New chat</span>
                </button>
            </div>
            
            <div class="history-section">
                <p class="history-title sidebar-text">Recent</p>
                <div id="history-list" class="history-list"></div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="header-left">
                    <h2 class="app-title">Ragnar</h2>
                    <div class="model-selector-wrapper">
                        <select id="model-select">
                            <option value="nvidia/nemotron-3-super-120b-a12b" selected>Nemotron 3 Super 120B</option>
                            <option value="minimaxai/minimax-m2.7">Minimax M2.7</option>
                            <option value="qwen/qwen3.5-397b-a17b">Qwen 3.5 397B</option>
                            <option value="meta/llama3-8b-instruct">Llama 3 8B Instruct</option>
                        </select>
                    </div>
                </div>
                
                <!-- Hover Area for Tokens -->
                <div class="token-stats" id="token-hover-area">
                    Tokens: <span id="session-tokens">0</span>
                    <div class="token-tooltip">
                        <div class="tooltip-row"><span>Input:</span> <span id="input-tokens">0</span></div>
                        <div class="tooltip-row"><span>Output:</span> <span id="output-tokens">0</span></div>
                        <div class="tooltip-row tooltip-total"><span>Cost:</span> <span id="session-cost">$0.00000</span></div>
                        <button id="tokenizer-btn" class="tokenizer-tool-link">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                            View Tokens
                        </button>
                    </div>
                </div>
            </header>

            <div id="chat-container" class="chat-container">
                <div id="chat-messages" class="chat-messages">
                    <div class="welcome-screen" id="welcome-screen">
                        <h1>Hello, I am Ragnar.</h1>
                    </div>
                </div>
            </div>

            <!-- Input Area with Mobile Wrapper -->
            <div class="input-area-wrapper">
                <div id="timer-container" class="timer-container">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    <span id="timer-text">00:00</span>
                </div>

                <div class="input-box">
                    <textarea id="user-input" placeholder="Enter a prompt here" rows="1"></textarea>
                    <button id="send-btn" class="send-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M3.4 20.4L20.85 12.92C21.66 12.57 21.66 11.43 20.85 11.08L3.4 3.6C2.74 3.31 2.01 3.8 2.01 4.51L2 9.12C2 9.62 2.37 10.05 2.87 10.11L17 12L2.87 13.88C2.37 13.95 2 14.38 2 14.88L2.01 19.49C2.01 20.2 2.74 20.69 3.4 20.4Z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
                <div class="footer-note">Ragnar may display inaccurate info, including about people, so double-check its responses.</div>
            </div>
        </main>
    </div>

    <!-- Tokenizer Modal -->
    <div id="tokenizer-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Token Breakdown</h2>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            <p class="modal-subtitle">Showing approximate BPE tokenization.</p>
            <div id="token-visualizer-box" class="token-visualizer-box"></div>
            <div class="token-stats-footer">
                Total tokens: <strong id="modal-token-count">0</strong>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
